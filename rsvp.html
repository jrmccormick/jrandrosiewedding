<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSVP | James & Rosie Wedding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container nav-inner">
        <h1 class="logo">James & Rosie</h1>
        <nav>
          <ul class="nav-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="rsvp.html" class="active">RSVP</a></li>
            <li><a href="timeline.html">Timeline</a></li>
            <li><a href="travel.html">Travel</a></li>
            <li><a href="hotels.html">Hotels</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="page-main container narrow">
      <section class="page-header">
        <p class="eyebrow">RSVP</p>
        <h2>Reply details coming soon</h2>
        <p>
          We are still finalizing the RSVP setup. In the meantime, the form below reflects the information we plan to collect for the wedding weekend.
        </p>
      </section>

      <section class="content-card">
        <form class="rsvp-form">
          <input type="text" name="name" placeholder="Name" required />
          <input type="email" name="email" placeholder="Email" required />
          <select name="wedding" required>
            <option value="">Attending wedding</option>
            <option>Yes</option>
            <option>No</option>
          </select>
          <select name="wine-tour">
            <option value="">Attending Saturday wine tour</option>
            <option>Yes</option>
            <option>No</option>
            <option>Maybe</option>
          </select>
          <input type="text" name="hotel" placeholder="Hotel choice or where you are staying" />
          <textarea name="notes" rows="5" placeholder="Notes or dietary restrictions"></textarea>
          <button type="button">RSVP details coming soon</button>
        </form>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 James & Rosie. All rights reserved.</p>
    </footer>
  </body>
</html>
